<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ZZZ Team Builder</title>

<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
text-align:center;
padding:20px;
}

h1{
margin-bottom:25px;
}

.grid{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.character{
background:#1e293b;
padding:15px;
border-radius:10px;
width:150px;
}

img{
width:100%;
border-radius:8px;
}

select{
margin-top:10px;
padding:6px;
width:100%;
}

button{
margin-top:25px;
padding:12px 25px;
background:#22c55e;
border:none;
border-radius:8px;
font-size:16px;
color:white;
cursor:pointer;
}

.card{
margin-top:30px;
background:#1e293b;
padding:20px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>Zenless Zone Zero Team Builder</h1>

<div class="grid">

<div class="character">
<img id="img1" src="">
<select id="c1"></select>
</div>

<div class="character">
<img id="img2" src="">
<select id="c2"></select>
</div>

<div class="character">
<img id="img3" src="">
<select id="c3"></select>
</div>

</div>

<button id="buildBtn">Créer Team</button>

<div class="card">

<div id="team"></div>
<div id="score"></div>
<div id="meta"></div>

</div>

<script>

const characters = {

"Ye Shunguang":"https://via.placeholder.com/120",
"Pulchra":"https://via.placeholder.com/120",
"Sunniva":"https://via.placeholder.com/120",
"Anby":"https://via.placeholder.com/120",
"Soldier 11":"https://via.placeholder.com/120",
"Lucy":"https://via.placeholder.com/120",
"Anton":"https://via.placeholder.com/120"

};

const select1 = document.getElementById("c1");
const select2 = document.getElementById("c2");
const select3 = document.getElementById("c3");

function populate(){

Object.keys(characters).forEach(name => {

select1.add(new Option(name,name));
select2.add(new Option(name,name));
select3.add(new Option(name,name));

});

updateImages();

}

function updateImages(){

document.getElementById("img1").src = characters[select1.value];
document.getElementById("img2").src = characters[select2.value];
document.getElementById("img3").src = characters[select3.value];

}

select1.addEventListener("change", updateImages);
select2.addEventListener("change", updateImages);
select3.addEventListener("change", updateImages);

document.getElementById("buildBtn").addEventListener("click", buildTeam);

function buildTeam(){

const a = select1.value;
const b = select2.value;
const c = select3.value;

let score = 50;

if(a==="Ye Shunguang" && b==="Pulchra") score += 20;
if(c==="Sunniva") score += 10;

document.getElementById("team").innerText =
"Équipe : " + a + " + " + b + " + " + c;

document.getElementById("score").innerText =
"Score de synergie : " + score + "/100";

let meta = "Équipe correcte";

if(score >= 80) meta = "🔥 META TEAM";
else if(score >= 65) meta = "⭐ Très bonne team";

document.getElementById("meta").innerText = meta;

}

populate();

</script>

</body>
</html>
